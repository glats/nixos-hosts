name: Weekly Flake Update

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Update flake inputs
        run: |
          nix flake update --commit-lock-file
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'chore: update flake.lock'
          body: |
            ## Automated Flake Update

            This PR updates the following inputs:
            - `nixpkgs`
            - `home-manager`
            - `sops-nix`
            - `nix-colors`
            - `gentle-ai-src`
            - `asus-fan-control-src`
            - `pipewire-module-xrdp-src`
            - `nvim-config`

            ### Changes:
            ```
            ${{ steps.update.outputs.diff || 'See flake.lock changes' }}
            ```

            ### Testing:
            - [ ] Build `rog` configuration
            - [ ] Build `thinkcentre` configuration
            - [ ] Deploy to test host
          branch: update/flake-lock
          delete-branch: true
          labels: |
            dependencies
            automated
          commit-message: 'chore: update flake.lock'

      - name: Summary
        run: |
          echo "::notice::Flake update completed. Check the created PR for details."
